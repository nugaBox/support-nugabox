# 운영: 빌드 산출물 실행 (Dockerfile 기본은 prod용 멀티스테이지)
services:
  postgres:
    ports: []

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/main.js
    ports:
      - "${BACKEND_PORT:-6041}:4000"
    environment:
      NODE_ENV: production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_ORIGIN: http://backend:4000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6040/api}
    command: npm run start
    ports:
      - "${FRONTEND_PORT:-6040}:3000"
    environment:
      NODE_ENV: production
      INTERNAL_API_ORIGIN: http://backend:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6040/api}
