name: Deploy support-nugabox

on:
  push:
    branches:
      - main

concurrency:
  group: support-nugabox-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, dsm, nas, support, deploy]

    steps:
      - name: Deploy on Production Server
        id: deploy
        run: |
          set -e
          DI="/tmp/support-nugabox-deploy-${GITHUB_RUN_ID}.txt"
          echo "DEPLOY_INFO_FILE=$DI" >> "$GITHUB_ENV"

          cd /volume1/Develop/Docker/support-nugabox

          echo "Sync source from GitHub"
          git fetch origin main
          git reset --hard origin/main

          echo "Build Docker images (same stack as manual: base + prod overlay)"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build

          echo "Start containers"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          echo "Show container status"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -a

          {
            echo "Timestamp (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -a
          } > "$DI"

      - name: Send Success Notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "✅ 배포 성공",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
              "",
              "배포 정보:",
              info if info else "(없음)",
          ]
          send("\n".join(lines))
          print("telegram: ok")
          PY

      - name: Send Failure Notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "❌ 배포 실패",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
          ]
          if info:
              lines += ["", "마지막으로 수집된 배포 정보:", info]
          send("\n".join(lines))
          print("telegram: failure notice sent")
          PY
