name: Deploy support

on:
  push:
    branches:
      - main

concurrency:
  group: support-deploy
  cancel-in-progress: false

env:
  DEPLOY_DIR: /volume1/Develop/Sites/support
  # 폴더명이 support여도 기존 DB·업로드 볼륨(support-nugabox_*) 유지
  COMPOSE_PROJECT_NAME: support-nugabox
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, nugacloud]

    steps:
      - name: Deploy on Production Server
        id: deploy
        run: |
          set -euo pipefail

          DI="/tmp/support-deploy-${GITHUB_RUN_ID}.txt"
          echo "DEPLOY_INFO_FILE=$DI" >> "$GITHUB_ENV"

          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          LAST_SHA_FILE="${DEPLOY_DIR}/.deploy-last-sha"
          BUILD_PATHS="backend frontend docker-compose.yml docker-compose.prod.yml compose.sh"

          step_time() {
            echo "[timing] $1 — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          }

          cd "$DEPLOY_DIR"

          step_time "git sync start"
          git fetch origin main
          git reset --hard origin/main
          CUR="$(git rev-parse HEAD)"
          step_time "git sync done"

          PREV=""
          if [ -f "$LAST_SHA_FILE" ]; then
            PREV="$(cat "$LAST_SHA_FILE")"
          fi

          NEED_BUILD=1
          if [ -n "$PREV" ] && [ "$PREV" = "$CUR" ]; then
            echo "Same commit as last deploy ($CUR) — skip image build"
            NEED_BUILD=0
          elif [ -n "$PREV" ]; then
            if git diff --quiet "$PREV" "$CUR" -- $BUILD_PATHS; then
              echo "No changes under backend/frontend/compose — skip image build"
              NEED_BUILD=0
            fi
          fi

          if [ "$NEED_BUILD" -eq 1 ]; then
            step_time "docker compose build start (parallel)"
            $COMPOSE build --parallel
            step_time "docker compose build done"
          else
            echo "Skipped docker compose build"
          fi

          step_time "docker compose up start"
          $COMPOSE up -d
          step_time "docker compose up done"

          step_time "container status"
          {
            echo "Timestamp (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            $COMPOSE ps -a
          } > "$DI"

          echo "$CUR" > "$LAST_SHA_FILE"

      - name: Send Success Notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "✅ 배포 성공",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
              "",
              "배포 정보:",
              info if info else "(없음)",
          ]
          send("\n".join(lines))
          print("telegram: ok")
          PY

      - name: Send Failure Notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "❌ 배포 실패",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
          ]
          if info:
              lines += ["", "마지막으로 수집된 배포 정보:", info]
          send("\n".join(lines))
          print("telegram: failure notice sent")
          PY
