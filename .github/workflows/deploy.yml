name: Deploy support-nugabox

on:
  push:
    branches:
      - main

concurrency:
  group: support-nugabox-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, dsm, nas, support, deploy]

    steps:
      - name: Deploy support on Synology
        id: deploy
        run: |
          set -e

          cd /volume1/Develop/Docker/support-nugabox

          echo "Sync source from GitHub"
          git fetch origin main
          git reset --hard origin/main

          echo "Build Docker images (same stack as manual: base + prod overlay)"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml build

          echo "Start containers"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          echo "Show container status"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -a

          {
            echo "Timestamp (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -a
          } > /tmp/deploy_info.txt

          echo "deploy_info<<DEPLOY_INFO_EOF" >> "$GITHUB_ENV"
          cat /tmp/deploy_info.txt >> "$GITHUB_ENV"
          echo "DEPLOY_INFO_EOF" >> "$GITHUB_ENV"

      - name: Send Telegram Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: "7758712361"
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *배포 성공*

            📍 *저장소*: ${{ github.repository }}
            🔄 *브랜치*: ${{ github.ref_name }}
            👨‍💻 *커밋 해시*: `${{ github.sha }}`

            📊 *배포 정보*:
            ```
            ${{ env.deploy_info }}
            ```

      - name: Send Telegram Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: "7758712361"
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *배포 실패*

            📍 *저장소*: ${{ github.repository }}
            🔄 *브랜치*: ${{ github.ref_name }}
            👨‍💻 *커밋 해시*: `${{ github.sha }}`
