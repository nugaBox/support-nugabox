# 개발: 소스 마운트 + hot reload
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-6042}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    ports:
      - "${BACKEND_PORT:-6041}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "${FRONTEND_PORT:-6040}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      # 브라우저가 호스트에서 백엔드로 접근할 때 사용
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6041}
