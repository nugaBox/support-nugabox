# 개발: 소스 마운트 + hot reload
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-6042}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    ports:
      - "${BACKEND_PORT:-6041}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - "${FRONTEND_PORT:-6040}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      INTERNAL_API_ORIGIN: http://backend:4000
      # 브라우저(호스트) → 호스트에 노출된 프론트 포트의 /api 로 요청 → Next 리라이트 → Nest
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6040/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:6040}
