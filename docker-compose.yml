# 공통 서비스 정의 베이스 (실행 시 dev/prod 오버레이 사용)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nugabox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nugabox}
      POSTGRES_DB: ${POSTGRES_DB:-nugabox_support}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nugabox} -d ${POSTGRES_DB:-nugabox_support}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 컨테이너 간 통신: 호스트용 DATABASE_URL(.env)과 무관하게 고정
      DATABASE_URL: postgresql://nugabox:nugabox@postgres:5432/nugabox_support?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:6040}
      NODE_ENV: ${NODE_ENV:-production}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:6040}
      PORT: 4000
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_ORIGIN: http://backend:4000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6040/api}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_ORIGIN: http://backend:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6040/api}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
    expose:
      - "3000"

volumes:
  pgdata:
  uploads:
